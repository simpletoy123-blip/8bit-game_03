<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Robot Battle</title>

<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: monospace;
  }

  button {
    margin: 5px;
    padding: 10px;
    font-size: 16px;
  }
</style>
</head>

<body>

<!-- ===== MENU ===== -->
<div id="menu">
  <h1>ROBOT SELECT</h1>

  <button onclick="selectRobot('GM CARDBOARD')">GM CARDBOARD</button>
  <button onclick="selectRobot('RED TIGER')">RED TIGER</button>
  <button onclick="selectRobot('GREEN GOLEM')">GREEN GOLEM</button>
  <button onclick="selectRobot('BLUE KNIGHT')">BLUE KNIGHT</button>

  <p id="selected">Selected: NONE</p>

  <button onclick="startGame()">START GAME</button>
</div>

<!-- ===== BATTLE ===== -->
<div id="battle" style="display:none;">
  <h2>BATTLE MODE</h2>

  <p id="playerRobot"></p>
  <p id="enemyRobot"></p>

  <button onclick="attack()">⚔️ Attack</button>
  <button onclick="defend()">🛡️ Defend</button>

  <p id="battleLog"></p>
</div>

<script>
let selectedRobot = "";
let playerHP = 100;
let enemyHP = 100;

function selectRobot(name) {
  selectedRobot = name;
  document.getElementById("selected").innerText = "Selected: " + name;
}

function startGame() {
  if (selectedRobot === "") {
    alert("Please select a robot first!");
    return;
  }

  document.getElementById("menu").style.display = "none";
  document.getElementById("battle").style.display = "block";

  document.getElementById("playerRobot").innerText =
    "Your Robot: " + selectedRobot + " HP: " + playerHP;

  document.getElementById("enemyRobot").innerText =
    "Enemy: GREEN GOLEM HP: " + enemyHP;
}

function attack() {
  let damage = Math.floor(Math.random() * 20) + 5;
  enemyHP -= damage;

  document.getElementById("battleLog").innerText =
    "You dealt " + damage + " damage!";

  enemyTurn();
  updateHP();
}

function defend() {
  document.getElementById("battleLog").innerText =
    "You defended! Reduced damage!";
  
  enemyTurn(true);
  updateHP();
}

function enemyTurn(defending = false) {
  let damage = Math.floor(Math.random() * 15) + 5;

  if (defending) {
    damage = Math.floor(damage / 2);
  }

  playerHP -= damage;
}

function updateHP() {
  document.getElementById("playerRobot").innerText =
    "Your Robot: " + selectedRobot + " HP: " + playerHP;

  document.getElementById("enemyRobot").innerText =
    "Enemy: GREEN GOLEM HP: " + enemyHP;

  if (playerHP <= 0) {
    alert("YOU LOSE");
    location.reload();
  }

  if (enemyHP <= 0) {
    alert("YOU WIN");
    location.reload();
  }
}
</script>

</body>
</html>
